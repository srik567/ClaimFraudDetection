<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#0f4c5c"/></marker></defs>
<rect width="100%" height="100%" fill="#f7f3ea"/>
<text x="40" y="50" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#1c1915">Claim Fraud Detection — Data Flow</text>
<text x="40" y="78" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5c564c">Documents → Extract → Analyze → Decide → Advisory → Outputs</text>

  <rect x="40" y="110" width="280" height="90" rx="10" fill="#eef6f8" stroke="#b4aa96" stroke-width="2"/>
  <text x="54" y="138" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#0f4c5c">1. Input</text>
  <text x="54" y="162" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">PDF / PNG / JPG claims</text>
<text x="54" y="180" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">or mock synthetic claims</text>


  <rect x="360" y="110" width="300" height="90" rx="10" fill="#fffdf8" stroke="#b4aa96" stroke-width="2"/>
  <text x="374" y="138" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#0f4c5c">2. Document Extractor</text>
  <text x="374" y="162" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Digital PDF → PyPDF2 text</text>
<text x="374" y="180" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Images / scans → Tesseract</text>
<text x="374" y="198" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Parse fields → claim JSON</text>


  <rect x="700" y="110" width="300" height="90" rx="10" fill="#fffdf8" stroke="#b4aa96" stroke-width="2"/>
  <text x="714" y="138" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#0f4c5c">3. Extraction Agent</text>
  <text x="714" y="162" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Normalize patient / invoice</text>
<text x="714" y="180" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">OCR confidence scoring</text>
<text x="714" y="198" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Build Claim model</text>


  <rect x="1040" y="110" width="300" height="90" rx="10" fill="#eef6f8" stroke="#b4aa96" stroke-width="2"/>
  <text x="1054" y="138" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#0f4c5c">Extracted JSON</text>
  <text x="1054" y="162" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">samples/extracted/*.json</text>
<text x="1054" y="180" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Ready for pipeline steps</text>

<line x1="320" y1="155" x2="355" y2="155" stroke="#0f4c5c" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="660" y1="155" x2="695" y2="155" stroke="#0f4c5c" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="1000" y1="155" x2="1035" y2="155" stroke="#0f4c5c" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="200" y="280" width="280" height="100" rx="10" fill="#fffdf8" stroke="#b4aa96" stroke-width="2"/>
  <text x="214" y="308" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#0f4c5c">4. Forensic Agent</text>
  <text x="214" y="332" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">PDF metadata (edit tools)</text>
<text x="214" y="350" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Image tamper check (ELA)</text>
<text x="214" y="368" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Document authenticity flags</text>


  <rect x="560" y="280" width="280" height="100" rx="10" fill="#fffdf8" stroke="#b4aa96" stroke-width="2"/>
  <text x="574" y="308" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#0f4c5c">5. Auditor Agent</text>
  <text x="574" y="332" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Exact duplicate match</text>
<text x="574" y="350" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Near-match invoice / policy</text>
<text x="574" y="368" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Same patient+date+amount</text>


  <rect x="920" y="280" width="280" height="100" rx="10" fill="#fffdf8" stroke="#b4aa96" stroke-width="2"/>
  <text x="934" y="308" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#0f4c5c">6. Risk Scorer</text>
  <text x="934" y="332" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Weighted fraud signals</text>
<text x="934" y="350" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Score 0–100</text>
<text x="934" y="368" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Drive claim decision</text>

<line x1="850" y1="200" x2="340" y2="280" stroke="#0f4c5c" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="850" y1="200" x2="700" y2="280" stroke="#0f4c5c" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="480" y1="380" x2="555" y2="330" stroke="#0f4c5c" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="840" y1="330" x2="915" y2="330" stroke="#0f4c5c" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="200" y="460" width="200" height="88" rx="10" fill="#e5f4ec" stroke="#b4aa96" stroke-width="2"/>
  <text x="214" y="488" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1f6b4a">Approved</text>
  <text x="214" y="512" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Score under 40</text>
<text x="214" y="530" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Pay / process normally</text>


  <rect x="460" y="460" width="220" height="88" rx="10" fill="#fff3d6" stroke="#b4aa96" stroke-width="2"/>
  <text x="474" y="488" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#8a5a00">Needs review</text>
  <text x="474" y="512" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Score 40–75</text>
<text x="474" y="530" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Claim manager checks</text>


  <rect x="740" y="460" width="220" height="88" rx="10" fill="#fde8e8" stroke="#b4aa96" stroke-width="2"/>
  <text x="754" y="488" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#9b1c1c">Hold — investigate</text>
  <text x="754" y="512" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Score over 75</text>
<text x="754" y="530" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">SIU / investigation</text>

<line x1="1060" y1="380" x2="300" y2="460" stroke="#0f4c5c" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="1060" y1="380" x2="570" y2="460" stroke="#0f4c5c" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="1060" y1="380" x2="850" y2="460" stroke="#0f4c5c" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="200" y="620" width="340" height="100" rx="10" fill="#eef6f8" stroke="#b4aa96" stroke-width="2"/>
  <text x="214" y="648" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#0f4c5c">7. Advisory narrative (optional)</text>
  <text x="214" y="672" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Local model for held / review claims</text>
<text x="214" y="690" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Plain-language findings for managers</text>
<text x="214" y="708" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Does not override exact duplicates</text>


  <rect x="600" y="620" width="300" height="100" rx="10" fill="#fffdf8" stroke="#b4aa96" stroke-width="2"/>
  <text x="614" y="648" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#0f4c5c">8. Feedback store</text>
  <text x="614" y="672" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">SQLite predictions + overrides</text>
<text x="614" y="690" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">retrain_thresholds() learning</text>
<text x="614" y="708" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Improve future sensitivity</text>


  <rect x="960" y="620" width="340" height="100" rx="10" fill="#eef6f8" stroke="#b4aa96" stroke-width="2"/>
  <text x="974" y="648" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#0f4c5c">9. Reports</text>
  <text x="974" y="672" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">HTML analysis for executives</text>
<text x="974" y="690" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Timing + efficiency KPIs</text>
<text x="974" y="708" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1c1915">Console summary</text>

<line x1="570" y1="548" x2="370" y2="620" stroke="#0f4c5c" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="850" y1="548" x2="370" y2="620" stroke="#0f4c5c" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="540" y1="670" x2="595" y2="670" stroke="#0f4c5c" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="900" y1="670" x2="955" y2="670" stroke="#0f4c5c" stroke-width="2" marker-end="url(#arrow)"/>
<text x="40" y="800" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5c564c">Authority: rule-based score decides status. Advisory text only explains findings for claim managers.</text>
<text x="40" y="830" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#5c564c">Outputs: samples/extracted/*.json  ·  samples/analysis_report.html  ·  fraud_feedback.db</text>
<text x="40" y="920" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#0f4c5c">ClaimFraudDetection</text>
<text x="40" y="945" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#5c564c">Data flow diagram</text>
</svg>
